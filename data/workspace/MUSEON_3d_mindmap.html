<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>MUSEON 3D 系統心智圖</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#F7F5F0;font-family:'Outfit','Noto Sans TC',sans-serif;color:#12121A}
canvas{display:block}

.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;
  background:linear-gradient(180deg,rgba(247,245,240,.96) 0%,rgba(247,245,240,0) 100%);
  pointer-events:none;
}
.topbar>*{pointer-events:auto}
.topbar h1{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:#C4502A}
.topbar .hint{font-size:.65rem;color:#5A5A6E}

.legend{
  position:fixed;top:52px;left:12px;z-index:90;
  background:rgba(253,252,250,.94);border:1px solid #E2E0DA;
  border-radius:10px;padding:14px 16px;width:195px;
  backdrop-filter:blur(12px);
  box-shadow:0 1px 3px rgba(18,18,26,.06),0 4px 12px rgba(18,18,26,.04);
}
.legend h3{font-family:'IBM Plex Mono',monospace;font-size:.58rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#9A3A1C;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:.66rem;color:#5A5A6E;cursor:pointer;transition:opacity .15s}
.legend-item:hover{color:#12121A}
.legend-item.dimmed{opacity:.25}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-div{height:1px;background:#E2E0DA;margin:10px 0}
.legend-link{display:flex;align-items:center;gap:8px;font-size:.6rem;color:#9898A8;margin-bottom:4px}
.legend-line{width:18px;height:0;flex-shrink:0}

.info-panel{
  position:fixed;top:52px;right:12px;z-index:90;
  background:rgba(253,252,250,.96);border:1px solid #E2E0DA;
  border-radius:10px;padding:16px 18px;width:280px;max-height:calc(100vh - 80px);
  overflow-y:auto;backdrop-filter:blur(12px);
  box-shadow:0 1px 3px rgba(18,18,26,.06),0 4px 12px rgba(18,18,26,.04);
  transition:opacity .25s,transform .25s;
  opacity:0;transform:translateX(12px);pointer-events:none;
}
.info-panel.visible{opacity:1;transform:translateX(0);pointer-events:auto}
.info-panel .nd-name{font-size:1rem;font-weight:600;color:#12121A}
.info-panel .nd-zh{font-size:.78rem;color:#5A5A6E;margin-bottom:6px}
.info-panel .nd-badge{
  font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:2px 8px;border-radius:100px;display:inline-block;margin-bottom:12px;
}
.info-panel h4{font-size:.66rem;font-weight:600;color:#9898A8;margin:10px 0 4px}
.conn-list{list-style:none}
.conn-list li{font-size:.64rem;color:#5A5A6E;padding:3px 0;border-bottom:1px solid rgba(226,224,218,.6);display:flex;align-items:center;gap:6px}
.conn-list li:last-child{border:none}
.conn-arrow{font-size:.7rem;flex-shrink:0}
.conn-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:#9898A8;margin-left:auto}

.controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:90;display:flex;gap:8px}
.btn{
  font-family:'IBM Plex Mono',monospace;font-size:.6rem;font-weight:600;
  letter-spacing:.04em;padding:6px 14px;border-radius:100px;
  border:1.5px solid #E2E0DA;background:rgba(253,252,250,.9);
  color:#5A5A6E;cursor:pointer;transition:all .15s;backdrop-filter:blur(8px);
}
.btn:hover{border-color:#C4502A;color:#C4502A}

.tooltip{
  position:fixed;z-index:200;pointer-events:none;
  background:rgba(253,252,250,.96);border:1px solid #E2E0DA;
  border-radius:8px;padding:8px 12px;
  box-shadow:0 2px 8px rgba(18,18,26,.1);
  font-size:12px;line-height:1.5;
  opacity:0;transition:opacity .15s;
  max-width:220px;
}
.tooltip.show{opacity:1}
.tooltip strong{color:#12121A}
.tooltip .sub{color:#5A5A6E;font-size:11px}
.tooltip .grp{font-family:'IBM Plex Mono',monospace;font-size:10px}

/* 3D labels via CSS2DRenderer */
.node-label{
  pointer-events:none;text-align:center;white-space:nowrap;
  text-shadow:0 0 4px rgba(247,245,240,.9),0 0 8px rgba(247,245,240,.7);
}
.node-label.hub{
  font-family:'Outfit','Noto Sans TC',sans-serif;font-size:11px;font-weight:600;
  color:#12121A;line-height:1.3;
}
.node-label.hub .en{font-size:11px;font-weight:600}
.node-label.hub .zh{font-size:9px;color:#5A5A6E;font-weight:400}
.node-label.sub{
  font-family:'Noto Sans TC','Outfit',sans-serif;font-size:8px;font-weight:400;
  color:#5A5A6E;
}
.link-label{
  pointer-events:none;
  font-family:'IBM Plex Mono',monospace;font-size:7px;font-weight:500;
  letter-spacing:.02em;color:#9898A8;white-space:nowrap;
  text-shadow:0 0 4px rgba(247,245,240,.95),0 0 8px rgba(247,245,240,.8);
}

/* ═══ Health Check System ═══ */
.health-row{
  display:flex;align-items:center;gap:6px;margin-bottom:10px;
  padding:6px 8px;border-radius:6px;background:rgba(226,224,218,.25);
}
.health-status{font-size:.6rem;color:#5A5A6E;flex:1}
.health-status.never{color:#C9943A;font-weight:600}
.health-btn{
  font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:600;
  letter-spacing:.04em;padding:5px 12px;border-radius:6px;
  border:none;background:#C4502A;color:#fff;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.health-btn:hover{background:#E0714D}
.health-btn:active{background:#9A3A1C}
.health-btn.copied{background:#2A7A6E}

.health-badge{
  pointer-events:none;text-align:center;
  font-family:'IBM Plex Mono',monospace;font-size:7px;font-weight:600;
  letter-spacing:.04em;padding:1px 4px;border-radius:100px;
  text-shadow:0 0 4px rgba(247,245,240,.95);
}
.health-badge.never{color:#C9943A}
.health-badge.checked{color:#2A7A6E}

/* ═══ Coverage Panel ═══ */
.coverage-panel{
  position:fixed;bottom:52px;left:12px;z-index:90;
  background:rgba(253,252,250,.94);border:1px solid #E2E0DA;
  border-radius:10px;padding:12px 14px;width:220px;
  backdrop-filter:blur(12px);
  box-shadow:0 1px 3px rgba(18,18,26,.06),0 4px 12px rgba(18,18,26,.04);
}
.coverage-panel h3{font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#9A3A1C;margin-bottom:8px}
.coverage-bar{height:6px;background:#E2E0DA;border-radius:3px;overflow:hidden;margin-bottom:6px}
.coverage-fill{height:100%;background:#C4502A;border-radius:3px;transition:width .3s}
.coverage-stat{font-size:.6rem;color:#5A5A6E;margin-bottom:4px}
.coverage-oldest{font-size:.55rem;color:#C9943A;margin-bottom:8px}
.coverage-toggle{
  font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:600;
  padding:4px 10px;border-radius:100px;cursor:pointer;
  border:1.5px solid #E2E0DA;background:transparent;color:#5A5A6E;
  transition:all .15s;
}
.coverage-toggle:hover{border-color:#C4502A;color:#C4502A}
.coverage-toggle.active{background:#C4502A;color:#fff;border-color:#C4502A}

/* ═══ Sync Info ═══ */
.sync-info{
  font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:500;
  color:#9898A8;letter-spacing:.02em;
}
.sync-info.stale{color:#C9943A}

/* ═══ Doctor Live Monitor ═══ */
.doctor-indicator{
  font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:500;
  color:#9898A8;letter-spacing:.02em;margin-left:12px;
}
.doctor-indicator.connected{color:#2A7A6E}
.doctor-indicator.polling{color:#B8923A}
.doctor-indicator.offline{color:#9898A8}
.doctor-toggle{margin-top:6px;border-color:#80B8A8 !important;color:#80B8A8 !important}
.doctor-toggle:hover{border-color:#C4502A !important;color:#C4502A !important}
.doctor-toggle.active{background:#C4502A !important;color:#fff !important;border-color:#C4502A !important}
.doctor-row{
  margin-top:8px;padding:8px 10px;background:#FDF5F3;border-radius:6px;
  border-left:3px solid #C4402A;font-family:'IBM Plex Mono',monospace;font-size:.6rem;
}
.doctor-issues{white-space:pre-wrap;line-height:1.5;color:#5A5A6E}
</style>
</head>

<div class="controls">

// ═══════════════════════════════════════
const HC_KEY = 'museon-health-checks';
function loadHealthData() {
  try { return JSON.parse(localStorage.getItem(HC_KEY)) || {}; } catch { return {}; }
}
function saveHealthData(data) {
  localStorage.setItem(HC_KEY, JSON.stringify(data));
}
function getNodeHealth(nodeId) {
  const data = loadHealthData();
  return data[nodeId] || { count: 0, lastCheck: null };
}
function incrementHealth(nodeId) {
  const data = loadHealthData();
  if (!data[nodeId]) data[nodeId] = { count: 0, lastCheck: null };
  data[nodeId].count++;
  data[nodeId].lastCheck = new Date().toISOString();
  saveHealthData(data);
}
function formatTimeAgo(isoStr) {
  if (!isoStr) return null;
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 60) return mins + ' 分鐘前';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + ' 小時前';
  const days = Math.floor(hours / 24);
  return days + ' 天前';
}

// Group target positions on a Fibonacci sphere (uniform spherical distribution)
const groupKeys = Object.keys(GC);
const groupTargets = {};
const golden = (1 + Math.sqrt(5)) / 2;
groupKeys.forEach((g, i) => {
  if (g === 'center') { groupTargets[g] = new THREE.Vector3(0, 0, 0); return; }
  const theta = 2 * Math.PI * i / golden;
  const phi = Math.acos(1 - 2 * (i + 0.5) / groupKeys.length);
  const R = 35;
  groupTargets[g] = new THREE.Vector3(
    R * Math.sin(phi) * Math.cos(theta),
    R * Math.cos(phi),
    R * Math.sin(phi) * Math.sin(theta)
  );
});

// Connection weight per node (proxy for "熟練度")
nodes.forEach(n => {
  n.connCount = links.filter(l => l.source === n.id || l.target === n.id).length;
});

// Initialize positions near group targets with jitter
nodes.forEach(n => {
  const target = groupTargets[n.group] || new THREE.Vector3(0, 0, 0);
  const jitter = n.hub ? 3 : 12;
  n.pos = new THREE.Vector3(
    target.x + (Math.random() - 0.5) * jitter,
    target.y + (Math.random() - 0.5) * jitter,
    target.z + (Math.random() - 0.5) * jitter
  );
  n.vx = 0; n.vy = 0; n.vz = 0;
});

function getIntersectedNode(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);
  return intersects.length > 0 ? intersects[0].object.userData : null;
}

// Tooltip
const tip = document.getElementById('tip');
renderer.domElement.addEventListener('mousemove', e => {
  const n = getIntersectedNode(e);
  document.body.style.cursor = n ? 'pointer' : 'default';

  if (n && n !== selectedNode) {
    tip.innerHTML = '<strong>' + n.label + '</strong><br><span class="sub">' + n.zh + '</span><br><span class="grp" style="color:' + GC[n.group] + '">' + GN[n.group] + '</span>';
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY + 14) + 'px';
    tip.classList.add('show');
    if (!selectedNode && !coverageViewActive && !doctorViewActive) highlightNode(n);
  } else if (!n && !selectedNode) {
    tip.classList.remove('show');
    if (!coverageViewActive && !doctorViewActive) clearHighlight();
  }
});

// ═══ Drag detection — 修改2：拖拉不清除選取 ═══
let mouseDownX = 0, mouseDownY = 0;
renderer.domElement.addEventListener('pointerdown', e => {
  mouseDownX = e.clientX;
  mouseDownY = e.clientY;
  lastInteraction = Date.now();
});
renderer.domElement.addEventListener('pointerup', () => {
  lastInteraction = Date.now();
});

renderer.domElement.addEventListener('click', e => {
  // 修改2：距離 > 5px 視為拖拉，跳過選取邏輯
  const dx = e.clientX - mouseDownX, dy = e.clientY - mouseDownY;
  if (dx * dx + dy * dy > 25) return;

  const n = getIntersectedNode(e);
  if (n) {
    if (selectedNode === n) {
      selectedNode = null;
      if (!coverageViewActive && !doctorViewActive) clearHighlight();
      hideInfo();
      targetGoal.set(0, 0, 0); // 修改1：回到原點
    } else {
      selectedNode = n;
      if (!coverageViewActive && !doctorViewActive) highlightNode(n);
      showInfo(n);
      targetGoal.copy(n.pos); // 修改1：聚焦節點
    }
  } else {
    // 只有真正點空白才取消（不是拖拉結束）
    selectedNode = null;
    if (!coverageViewActive && !doctorViewActive) clearHighlight();
    hideInfo();
    targetGoal.set(0, 0, 0);
  }
  tip.classList.remove('show');
});

//  HIGHLIGHT
// ═══════════════════════════════════════
const dimColor = new THREE.Color('#E2E0DA');

function highlightNode(node) {
  const connected = new Set([node.id]);
  const connLinks = new Set();
  links.forEach(l => {
    if (l.source === node.id) { connected.add(l.target); connLinks.add(l); }
    if (l.target === node.id) { connected.add(l.source); connLinks.add(l); }
  });
  // If hub, also include children's connections
  if (node.hub || node.id === 'event-bus') {
    nodes.filter(n => n.p === node.id).forEach(kid => {
      connected.add(kid.id);
      links.forEach(l => {
        if (l.source === kid.id) { connected.add(l.target); connLinks.add(l); }
        if (l.target === kid.id) { connected.add(l.source); connLinks.add(l); }
      });
    });
  }

  nodeMeshes.forEach(m => {
    const n = m.userData;
    if (connected.has(n.id)) {
      m.material.color.copy(n.origColor);
      m.material.emissive.copy(n.origColor);
      m.material.emissiveIntensity = 0.6;
      m.material.opacity = 1;
      m.material.transparent = false;
      m.material.depthWrite = true;
      m.material.needsUpdate = true;
      m.renderOrder = 0;
      if (n.labelDiv) {
        n.labelDiv.style.opacity = '1';
        // 相關節點：字體放大 2 級 + 粗體
        const isHub = n.labelDiv.classList.contains('hub');
        if (isHub) {
          const enEl = n.labelDiv.querySelector('.en');
          const zhEl = n.labelDiv.querySelector('.zh');
          if (enEl) { enEl.style.fontSize = '13px'; enEl.style.fontWeight = '700'; }
          if (zhEl) { zhEl.style.fontSize = '11px'; zhEl.style.fontWeight = '700'; }
        } else {
          n.labelDiv.style.fontSize = '10px';
          n.labelDiv.style.fontWeight = '700';
        }
      }
    } else {
      m.material.color.copy(dimColor);
      m.material.emissive.set(0x000000);
      m.material.emissiveIntensity = 0;
      m.material.opacity = 0.06;
      m.material.transparent = true;
      m.material.depthWrite = false;
      m.material.needsUpdate = true;
      m.renderOrder = -1;
      if (n.labelDiv) {
        n.labelDiv.style.opacity = '0';
        // 無關節點：隱藏標籤
      }
    }
  });

  linkMeshes.forEach(line => {
    const l = line.userData;
    if (connLinks.has(l)) {
      line.material.opacity = 0.8;
      line.material.color.set(lkHex(l.type));
    } else {
      line.material.opacity = 0.03;
      line.material.color.copy(dimColor);
    }
  });

  // Dim/show link labels + 相關連線標籤放大 2 級 + 粗體
  linkLabels.forEach(ll => {
    if (connLinks.has(ll.link)) {
      ll.div.style.opacity = '1';
      ll.div.style.fontSize = '9px';
      ll.div.style.fontWeight = '700';
    } else {
      ll.div.style.opacity = '0.1';
      ll.div.style.fontSize = '';
      ll.div.style.fontWeight = '';
    }
  });
}

function clearHighlight() {
  nodeMeshes.forEach(m => {
    const n = m.userData;
    m.material.color.copy(n.origColor);
    m.material.emissive.copy(n.origColor);
    m.material.emissiveIntensity = 0.5;
    m.material.opacity = 1;
    m.material.transparent = false;
    m.material.depthWrite = true;
    m.material.needsUpdate = true;
    m.renderOrder = 0;
    if (n.labelDiv) {
      n.labelDiv.style.opacity = '1';
      // 還原字體大小與粗細
      const isHub = n.labelDiv.classList.contains('hub');
      if (isHub) {
        const enEl = n.labelDiv.querySelector('.en');
        const zhEl = n.labelDiv.querySelector('.zh');
        if (enEl) { enEl.style.fontSize = ''; enEl.style.fontWeight = ''; }
        if (zhEl) { zhEl.style.fontSize = ''; zhEl.style.fontWeight = ''; }
      } else {
        n.labelDiv.style.fontSize = '';
        n.labelDiv.style.fontWeight = '';
      }
    }
  });
  linkMeshes.forEach(line => {
    const l = line.userData;
    line.material.opacity = l.type === 'internal' ? 0.15 : 0.3;
    line.material.color.set(lkHex(l.type));
  });
  linkLabels.forEach(ll => { ll.div.style.opacity = '1'; ll.div.style.fontSize = ''; ll.div.style.fontWeight = ''; });
}

  const outL = [], inL = [];
  links.forEach(l => {
    if (l.source === node.id) outL.push(l);
    if (l.target === node.id) inL.push(l);
  });
  if (node.hub || node.id === 'event-bus') {
    nodes.filter(n => n.p === node.id).forEach(kid => {
      links.forEach(l => {
        if (l.source === kid.id) outL.push(l);
        if (l.target === kid.id) inL.push(l);
      });
    });
  }

  document.getElementById('i-name').textContent = node.label;
  document.getElementById('i-zh').textContent = node.zh;
  const badge = document.getElementById('i-badge');
  badge.textContent = GN[node.group];
  badge.style.background = GC[node.group] + '20';
  badge.style.color = GC[node.group];

  // 修改3：健康狀態顯示
  const health = getNodeHealth(node.id);
  const healthEl = document.getElementById('i-health');
  if (health.count === 0) {
    healthEl.textContent = '⚠ 從未檢查';
    healthEl.className = 'health-status never';
  } else {
    healthEl.textContent = '已檢查 ' + health.count + ' 次 · 上次：' + formatTimeAgo(health.lastCheck);
    healthEl.className = 'health-status';
  }

  const seenO = new Set();
  document.getElementById('i-out').innerHTML = outL.filter(l => {
    const k = l.target + l.label; if (seenO.has(k)) return false; seenO.add(k); return true;
  }).map(l => '<li><span class="conn-arrow" style="color:' + lkCSS(l.type) + '">→</span>' + (nodeMap[l.target]?.label || l.target) + '<span class="conn-lbl">' + l.label + '</span></li>').join('');

  const seenI = new Set();
  document.getElementById('i-in').innerHTML = inL.filter(l => {
    const k = l.source + l.label; if (seenI.has(k)) return false; seenI.add(k); return true;
  }).map(l => '<li><span class="conn-arrow" style="color:' + lkCSS(l.type) + '">←</span>' + (nodeMap[l.source]?.label || l.source) + '<span class="conn-lbl">' + l.label + '</span></li>').join('');

  document.getElementById('i-out-t').textContent = '輸出連結 (' + seenO.size + ')';
  document.getElementById('i-in-t').textContent = '輸入連結 (' + seenI.size + ')';

  // Doctor 診斷資訊
  const doctorRow = document.getElementById('doctorRow');
  const doctorEl = document.getElementById('i-doctor');
  if (doctorData && doctorData.nodes && doctorData.nodes[node.id]) {
    const ns = doctorData.nodes[node.id];
    if (ns.issues && ns.issues.length > 0) {
      const icon = ns.status === 'critical' ? '\uD83D\uDD34' : '\uD83D\uDFE1';
      doctorEl.textContent = icon + ' Doctor 發現 ' + ns.issues.length + ' 個問題：\n' + ns.issues.map(i => '  \u2022 ' + i).join('\n');
      doctorRow.style.display = '';
    } else {
      doctorEl.textContent = '\uD83D\uDFE2 Doctor 確認正常';
      doctorRow.style.display = '';
    }
  } else if (doctorData) {
    doctorEl.textContent = '\u26AA 不在 Doctor 掃描範圍';
    doctorRow.style.display = '';
  } else {
    doctorRow.style.display = 'none';
  }

  document.getElementById('info').classList.add('visible');
}

// ═══════════════════════════════════════
//  FORCE SIMULATION
// ═══════════════════════════════════════
function simulateForces() {
  if (simTemp < SIM_MIN) return;
  const dt = 0.4 * simTemp;

  // Reset forces
  nodes.forEach(n => { n.fx = 0; n.fy = 0; n.fz = 0; });

  // 1. Node repulsion (Coulomb-like)
  const repelK = 100;
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = a.pos.x - b.pos.x, dy = a.pos.y - b.pos.y, dz = a.pos.z - b.pos.z;
      let dist2 = dx*dx + dy*dy + dz*dz;
      if (dist2 < 4) dist2 = 4;
      const dist = Math.sqrt(dist2);
      const f = repelK / dist2;
      dx /= dist; dy /= dist; dz /= dist;
      a.fx += dx*f; a.fy += dy*f; a.fz += dz*f;
      b.fx -= dx*f; b.fy -= dy*f; b.fz -= dz*f;
    }
  }

  // 2. Link attraction (spring)
  const linkK = 0.06;
  const restLen = 10;
  links.forEach(l => {
    const sn = nodeMap[l.source], tn = nodeMap[l.target];
    if (!sn || !tn) return;
    let dx = tn.pos.x - sn.pos.x, dy = tn.pos.y - sn.pos.y, dz = tn.pos.z - sn.pos.z;
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
    const f = linkK * (dist - restLen);
    dx /= dist; dy /= dist; dz /= dist;
    sn.fx += dx*f; sn.fy += dy*f; sn.fz += dz*f;
    tn.fx -= dx*f; tn.fy -= dy*f; tn.fz -= dz*f;
  });

  // 3. Spherical shell constraint — push toward target sphere radius
  const sphereK = 0.04;
  nodes.forEach(n => {
    const dist = n.pos.length() || 1;
    const targetR = n.hub || n.id === 'event-bus' ? 0 : 38;
    const diff = targetR - dist;
    n.fx += (n.pos.x / dist) * diff * sphereK;
    n.fy += (n.pos.y / dist) * diff * sphereK;
    n.fz += (n.pos.z / dist) * diff * sphereK;
  });

  // 4. Group clustering — attract to group target center
  const groupK = 0.025;
  nodes.forEach(n => {
    const target = groupTargets[n.group];
    if (!target) return;
    n.fx += (target.x - n.pos.x) * groupK;
    n.fy += (target.y - n.pos.y) * groupK;
    n.fz += (target.z - n.pos.z) * groupK;
  });

  // 5. Central gravity — gentle pull toward origin
  const gravK = 0.005;
  nodes.forEach(n => {
    n.fx -= n.pos.x * gravK;
    n.fy -= n.pos.y * gravK;
    n.fz -= n.pos.z * gravK;
  });

  // 6. Apply forces (mass = 1 + connCount * 0.3)
  const dampK = 0.82;
  nodes.forEach(n => {
    const mass = 1 + n.connCount * 0.3;
    n.vx = (n.vx + n.fx / mass * dt) * dampK;
    n.vy = (n.vy + n.fy / mass * dt) * dampK;
    n.vz = (n.vz + n.fz / mass * dt) * dampK;
    n.pos.x += n.vx * dt;
    n.pos.y += n.vy * dt;
    n.pos.z += n.vz * dt;
    n.mesh.position.copy(n.pos);
  });

  // 7. Update link geometries
  linkMeshes.forEach(line => {
    const l = line.userData;
    const sn = nodeMap[l.source], tn = nodeMap[l.target];
    if (!sn || !tn) return;
    const arr = line.geometry.attributes.position.array;
    arr[0] = sn.pos.x; arr[1] = sn.pos.y; arr[2] = sn.pos.z;
    arr[3] = tn.pos.x; arr[4] = tn.pos.y; arr[5] = tn.pos.z;
    line.geometry.attributes.position.needsUpdate = true;
  });

  // 8. Update link label positions
  linkLabels.forEach(ll => {
    const sn = nodeMap[ll.link.source], tn = nodeMap[ll.link.target];
    if (!sn || !tn) return;
    ll.obj.position.set(
      (sn.pos.x + tn.pos.x) / 2,
      (sn.pos.y + tn.pos.y) / 2,
      (sn.pos.z + tn.pos.z) / 2
    );
  });

  simTemp *= SIM_COOL;
}

// ═══════════════════════════════════════
//  ANIMATE
// ═══════════════════════════════════════
// lastInteraction 已在 raycaster 區塊宣告，pointerdown/up 已在 drag detection 區塊註冊

function animate() {
  requestAnimationFrame(animate);

  // 修改1：平滑過渡旋轉中心 → targetGoal
  controls.target.lerp(targetGoal, 0.05);

  // 修改1：如果有選取節點，targetGoal 跟隨節點位置（力模擬中節點會動）
  if (selectedNode) {
    targetGoal.copy(selectedNode.pos);
  }

  // Auto-rotation (around controls.target, not world origin)
  if (autoRotate && Date.now() - lastInteraction > 2000) {
    const axis = new THREE.Vector3(0, 1, 0);
    const q = new THREE.Quaternion().setFromAxisAngle(axis, autoRotSpeed);
    // 繞 controls.target 旋轉（非世界原點）
    camera.position.sub(controls.target);
    camera.position.applyQuaternion(q);
    camera.position.add(controls.target);
    camera.up.applyQuaternion(q);
  }

  controls.update();
  simulateForces();

  // Doctor 心跳脈動動畫
  if (doctorViewActive) {
    const t = Date.now() * 0.003;
    nodeMeshes.forEach(m => {
      const n = m.userData;
      if (n._doctorPulse) {
        const ns = doctorData?.nodes?.[n.id];
        const speed = ns?.status === 'critical' ? 4.0 : 2.0;
        const amplitude = ns?.status === 'critical' ? 0.25 : 0.15;
        const pulse = 1.0 + Math.abs(Math.sin(t * speed)) * amplitude;
        m.scale.setScalar(pulse);
      } else {
        m.scale.setScalar(1.0);
      }
    });
  }

  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();

window.doHealthCheck = function() {
  if (!selectedNode) return;
  const node = selectedNode;

  // 收集連線資訊
  const outLinks = [], inLinks = [];
  links.forEach(l => {
    if (l.source === node.id) outLinks.push(l);
    if (l.target === node.id) inLinks.push(l);
  });
  if (node.hub || node.id === 'event-bus') {
    nodes.filter(n => n.p === node.id).forEach(kid => {
      links.forEach(l => {
        if (l.source === kid.id) outLinks.push(l);
        if (l.target === kid.id) inLinks.push(l);
      });
    });
  }

  // 收集相關聯節點 ID
  const relatedIds = new Set();
  outLinks.forEach(l => relatedIds.add(l.target));
  inLinks.forEach(l => relatedIds.add(l.source));
  relatedIds.delete(node.id);
  const connNames = [...relatedIds].map(id => nodeMap[id]?.label || id).join(', ');

  // 生成剪貼簿指令
  const cmd = [
    '\uD83D\uDD0D MUSEON 健康檢查請求',
    '\u2501'.repeat(17),
    '目標模組：' + node.label + '（' + node.zh + '）',
    '所屬群組：' + GN[node.group],
    '直接連線：' + connNames,
    '輸出連結：' + outLinks.length + ' 條 | 輸入連結：' + inLinks.length + ' 條',
    '',
    '請執行：',
    '1. 檢查相關模組的 log（~/MUSEON/logs/）',
    '2. 讀取 blast-radius.md 確認影響範圍',
    '3. DSE 第一性原理分析：問題背後的問題',
    '4. 提出修復建議與 plan',
    '5. 確認後自動迭代 + 同步更新藍圖與 3D 心智圖'
  ].join('\n');

  navigator.clipboard.writeText(cmd).then(() => {
    const btn = document.getElementById('i-health-btn');
    btn.textContent = '\u2713 已複製';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '健康檢查'; btn.classList.remove('copied'); }, 2000);
  });

  // 計數 +1（本節點 + 相關聯節點）
  incrementHealth(node.id);
  relatedIds.forEach(id => incrementHealth(id));

  // 更新 info panel 健康顯示
  const health = getNodeHealth(node.id);
  const healthEl = document.getElementById('i-health');
  healthEl.textContent = '已檢查 ' + health.count + ' 次 · 上次：' + formatTimeAgo(health.lastCheck);
  healthEl.className = 'health-status';

  // 更新覆蓋率面板 & 節點徽章
  updateCoveragePanel();
  updateHealthBadges();
};

// ═══════════════════════════════════════
//  COVERAGE PANEL — 覆蓋率視圖
// ═══════════════════════════════════════
function updateCoveragePanel() {
  const data = loadHealthData();
  let checked = 0;
  let oldestNode = null;
  let oldestTime = Infinity;

  nodes.forEach(n => {
    const h = data[n.id];
    if (h && h.count > 0) {
      checked++;
      const t = new Date(h.lastCheck).getTime();
      if (t < oldestTime) { oldestTime = t; oldestNode = n; }
    }
  });

  const total = nodes.length;
  const pct = Math.round(checked / total * 100);

  document.getElementById('covFill').style.width = pct + '%';
  document.getElementById('covStat').textContent = checked + '/' + total + ' (' + pct + '%)';

  const neverChecked = total - checked;
  if (checked === 0) {
    document.getElementById('covOldest').textContent = '尚無檢查記錄';
  } else if (neverChecked > 0) {
    document.getElementById('covOldest').textContent = '\u26A0 ' + neverChecked + ' 個節點從未檢查';
  } else if (oldestNode) {
    document.getElementById('covOldest').textContent = '最久未查：' + oldestNode.label + '（' + formatTimeAgo(new Date(oldestTime).toISOString()) + '）';
  }
}

window.toggleCoverageView = function() {
  coverageViewActive = !coverageViewActive;
  const btn = document.getElementById('covToggle');
  btn.classList.toggle('active', coverageViewActive);
  btn.textContent = coverageViewActive ? '關閉覆蓋率視圖' : '覆蓋率視圖';

  if (coverageViewActive) {
    // 熱力圖模式
    const data = loadHealthData();
    nodeMeshes.forEach(m => {
      const n = m.userData;
      const h = data[n.id];
      const count = h ? h.count : 0;
      let heatColor;
      if (count === 0) heatColor = new THREE.Color('#C4402A');       // Error 紅
      else if (count <= 2) heatColor = new THREE.Color('#B8923A');   // Warning 金
      else heatColor = new THREE.Color('#2A7A6E');                   // Success 綠

      m.material.color.copy(heatColor);
      m.material.emissive.copy(heatColor);
      m.material.emissiveIntensity = 0.6;
      m.material.opacity = 1;
      m.material.transparent = false;
      m.material.needsUpdate = true;
    });
  } else {
    // 恢復原色
    if (selectedNode) { highlightNode(selectedNode); }
    else { clearHighlight(); }
  }
};

//  HEALTH BADGES — 節點健康徽章
// ═══════════════════════════════════════
const healthBadgeDivs = {};

function createHealthBadges() {
  nodes.forEach(n => {
    const div = document.createElement('div');
    div.className = 'health-badge';
    const lbl = new CSS2DObject(div);
    lbl.position.set(0, -(n.r + 1.2), 0);
    n.mesh.add(lbl);
    healthBadgeDivs[n.id] = div;
  });
  updateHealthBadges();
}

function updateHealthBadges() {
  const data = loadHealthData();
  nodes.forEach(n => {
    const div = healthBadgeDivs[n.id];
    if (!div) return;
    const h = data[n.id];
    const count = h ? h.count : 0;
    if (count === 0) {
      div.textContent = '\u26A0';
      div.className = 'health-badge never';
    } else {
      div.textContent = '\u00D7' + count;
      div.className = 'health-badge checked';
    }
  });
}

// ═══════════════════════════════════════
//  DOCTOR LIVE MONITOR — B+C 混合方案
// ═══════════════════════════════════════
// （Doctor 狀態變數已前移至 raycaster 區塊，避免 TDZ）

function updateDoctorIndicator(state) {
  const el = document.getElementById('doctorStatus');
  el.className = 'doctor-indicator ' + state;
  if (state === 'connected')    el.textContent = '\uD83D\uDFE2 Doctor 監控中';
  else if (state === 'polling') el.textContent = '\uD83D\uDFE1 Doctor 輪詢中';
  else                          el.textContent = '\u26AA Doctor 離線';
}

// （doctorReconnectAttempts / MAX / BASE_MS 已前移至 raycaster 區塊）

function connectDoctor() {
  try {
    doctorWs = new WebSocket(DOCTOR_WS);
    doctorWs.onopen = () => {
      doctorReconnectAttempts = 0;
      updateDoctorIndicator('connected');
      if (doctorPollTimer) { clearInterval(doctorPollTimer); doctorPollTimer = null; }
    };
    doctorWs.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'doctor_status') {
          doctorData = msg.data;
          if (doctorViewActive) applyDoctorColors();
          updateDoctorBadges();
        }
      } catch { /* malformed JSON — ignore */ }
    };
    doctorWs.onclose = () => {
      if (doctorReconnectAttempts < DOCTOR_MAX_RECONNECT) {
        doctorReconnectAttempts++;
        const delay = DOCTOR_RECONNECT_BASE_MS * doctorReconnectAttempts;
        setTimeout(connectDoctor, delay);
        updateDoctorIndicator('polling');
      } else {
        updateDoctorIndicator('polling');
        startDoctorPolling();
      }
    };
    doctorWs.onerror = () => { /* onclose will fire next — let it handle reconnect */ };
    // 心跳 15s（縮短間隔以更早偵測斷線）
    if (doctorHeartbeatTimer) clearInterval(doctorHeartbeatTimer);
    doctorHeartbeatTimer = setInterval(() => {
      if (doctorWs?.readyState === WebSocket.OPEN) {
        doctorWs.send(JSON.stringify({type: 'ping'}));
      }
    }, 15000);
  } catch {
    startDoctorPolling();
  }
}

function startDoctorPolling() {
  if (doctorPollTimer) return;
  fetchDoctorStatus();
  doctorPollTimer = setInterval(fetchDoctorStatus, 60000);
}

async function fetchDoctorStatus() {
  try {
    const res = await fetch(DOCTOR_API + '/api/doctor/node-status');
    if (res.ok) {
      doctorData = await res.json();
      updateDoctorIndicator('polling');
      if (doctorViewActive) applyDoctorColors();
      updateDoctorBadges();
    }
  } catch {
    updateDoctorIndicator('offline');
  }
}

function applyDoctorColors() {
  if (!doctorData?.nodes) return;
  nodeMeshes.forEach(m => {
    const n = m.userData;
    const nodeStatus = doctorData.nodes[n.id];
    let color;
    if (!nodeStatus)                        color = new THREE.Color('#E2E0DA');
    else if (nodeStatus.status === 'critical') color = new THREE.Color('#C4402A');
    else if (nodeStatus.status === 'warning')  color = new THREE.Color('#B8923A');
    else                                    color = new THREE.Color('#2A7A6E');

    m.material.color.copy(color);
    m.material.emissive.copy(color);
    m.material.emissiveIntensity = 0.6;
    m.material.opacity = 1;
    m.material.transparent = false;
    m.material.needsUpdate = true;

    // 標記脈動節點
    n._doctorPulse = nodeStatus && (nodeStatus.status === 'critical' || nodeStatus.status === 'warning');
  });
}

function updateDoctorBadges() {
  // 更新 topbar Doctor toggle 按鈕的問題計數
  if (!doctorData?.summary) return;
  const btn = document.getElementById('doctorToggle');
  const total = (doctorData.summary.warning || 0) + (doctorData.summary.critical || 0);
  if (total > 0) {
    btn.textContent = doctorViewActive ? '關閉 Doctor 視圖 (' + total + ')' : 'Doctor 診斷視圖 (' + total + ')';
  } else {
    btn.textContent = doctorViewActive ? '關閉 Doctor 視圖' : 'Doctor 診斷視圖';
  }
}

window.toggleDoctorView = function() {
  doctorViewActive = !doctorViewActive;
  // 互斥：關閉覆蓋率視圖
  if (doctorViewActive && coverageViewActive) toggleCoverageView();

  const btn = document.getElementById('doctorToggle');
  btn.classList.toggle('active', doctorViewActive);

  if (doctorViewActive) {
    if (doctorData) {
      applyDoctorColors();
    } else {
      // 首次開啟且無資料，嘗試拉取
      fetchDoctorStatus();
    }
    updateDoctorBadges();
  } else {
    // 恢復原色 + 清除脈動
    nodeMeshes.forEach(m => {
      m.userData._doctorPulse = false;
      m.scale.setScalar(1.0);
    });
    if (selectedNode) highlightNode(selectedNode);
    else clearHighlight();
    updateDoctorBadges();
  }
};

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
initSyncInfo();
createHealthBadges();
updateCoveragePanel();
connectDoctor();

</script>
