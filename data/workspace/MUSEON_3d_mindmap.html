<head>
<meta charset="UTF-8">
<title>MUSEON 3D 系統心智圖</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#F7F5F0;font-family:'Outfit','Noto Sans TC',sans-serif;color:#12121A}
canvas{display:block}

.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;
  background:linear-gradient(180deg,rgba(247,245,240,.96) 0%,rgba(247,245,240,0) 100%);
  pointer-events:none;
}
.topbar>*{pointer-events:auto}
.topbar h1{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:#C4502A}
.topbar .hint{font-size:.65rem;color:#5A5A6E}

.legend{
  position:fixed;top:52px;left:12px;z-index:90;
  background:rgba(253,252,250,.94);border:1px solid #E2E0DA;
  border-radius:10px;padding:14px 16px;width:195px;
  backdrop-filter:blur(12px);
  box-shadow:0 1px 3px rgba(18,18,26,.06),0 4px 12px rgba(18,18,26,.04);
}
.legend h3{font-family:'IBM Plex Mono',monospace;font-size:.58rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#9A3A1C;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:.66rem;color:#5A5A6E;cursor:pointer;transition:opacity .15s}
.legend-item:hover{color:#12121A}
.legend-item.dimmed{opacity:.25}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.legend-div{height:1px;background:#E2E0DA;margin:10px 0}
.legend-link{display:flex;align-items:center;gap:8px;font-size:.6rem;color:#9898A8;margin-bottom:4px}
.legend-line{width:18px;height:0;flex-shrink:0}

.info-panel{
  position:fixed;top:52px;right:12px;z-index:90;
  background:rgba(253,252,250,.96);border:1px solid #E2E0DA;
  border-radius:10px;padding:16px 18px;width:280px;max-height:calc(100vh - 80px);
  overflow-y:auto;backdrop-filter:blur(12px);
  box-shadow:0 1px 3px rgba(18,18,26,.06),0 4px 12px rgba(18,18,26,.04);
  transition:opacity .25s,transform .25s;
  opacity:0;transform:translateX(12px);pointer-events:none;
}
.info-panel.visible{opacity:1;transform:translateX(0);pointer-events:auto}
.info-panel .nd-name{font-size:1rem;font-weight:600;color:#12121A}
.info-panel .nd-zh{font-size:.78rem;color:#5A5A6E;margin-bottom:6px}
.info-panel .nd-badge{
  font-family:'IBM Plex Mono',monospace;font-size:.55rem;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:2px 8px;border-radius:100px;display:inline-block;margin-bottom:12px;
}
.info-panel h4{font-size:.66rem;font-weight:600;color:#9898A8;margin:10px 0 4px}
.conn-list{list-style:none}
.conn-list li{font-size:.64rem;color:#5A5A6E;padding:3px 0;border-bottom:1px solid rgba(226,224,218,.6);display:flex;align-items:center;gap:6px}
.conn-list li:last-child{border:none}
.conn-arrow{font-size:.7rem;flex-shrink:0}
.conn-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:#9898A8;margin-left:auto}

.controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:90;display:flex;gap:8px}
.btn{
  font-family:'IBM Plex Mono',monospace;font-size:.6rem;font-weight:600;
  letter-spacing:.04em;padding:6px 14px;border-radius:100px;
  border:1.5px solid #E2E0DA;background:rgba(253,252,250,.9);
  color:#5A5A6E;cursor:pointer;transition:all .15s;backdrop-filter:blur(8px);
}
.btn:hover{border-color:#C4502A;color:#C4502A}

.tooltip{
  position:fixed;z-index:200;pointer-events:none;
  background:rgba(253,252,250,.96);border:1px solid #E2E0DA;
  border-radius:8px;padding:8px 12px;
  box-shadow:0 2px 8px rgba(18,18,26,.1);
  font-size:12px;line-height:1.5;
  opacity:0;transition:opacity .15s;
  max-width:220px;
}
.tooltip.show{opacity:1}
.tooltip strong{color:#12121A}
.tooltip .sub{color:#5A5A6E;font-size:11px}
.tooltip .grp{font-family:'IBM Plex Mono',monospace;font-size:10px}

/* 3D labels via CSS2DRenderer */
.node-label{
  pointer-events:none;text-align:center;white-space:nowrap;
  text-shadow:0 0 4px rgba(247,245,240,.9),0 0 8px rgba(247,245,240,.7);
}
.node-label.hub{
  font-family:'Outfit','Noto Sans TC',sans-serif;font-size:11px;font-weight:600;
  color:#12121A;line-height:1.3;
}
.node-label.hub .en{font-size:11px;font-weight:600}
.node-label.hub .zh{font-size:9px;color:#5A5A6E;font-weight:400}
.node-label.sub{
  font-family:'Noto Sans TC','Outfit',sans-serif;font-size:8px;font-weight:400;
  color:#5A5A6E;
}
.link-label{
  pointer-events:none;
  font-family:'IBM Plex Mono',monospace;font-size:7px;font-weight:500;
  letter-spacing:.02em;color:#9898A8;white-space:nowrap;
  text-shadow:0 0 4px rgba(247,245,240,.95),0 0 8px rgba(247,245,240,.8);
}
</style>

  <div class="legend-item" data-g="doctor"><div class="legend-dot" style="background:#2D8A6E"></div>Doctor 診斷</div>

</div>

<div class="info-panel" id="info">

  <div class="nd-zh" id="i-zh"></div>
  <div class="nd-badge" id="i-badge"></div>
  <h4 id="i-out-t">輸出連結</h4>
  <ul class="conn-list" id="i-out"></ul>
  <h4 id="i-in-t">輸入連結</h4>
  <ul class="conn-list" id="i-in"></ul>
</div>

<div class="controls">
  <button class="btn" onclick="resetView()">重置視角</button>
  <button class="btn" onclick="clearSelection()">取消選取</button>
  <button class="btn" id="rotBtn" onclick="toggleRot()">自動旋轉：開</button>
  <button class="btn" id="simBtn" onclick="reheatSim()">重新模擬</button>
</div>

<div class="tooltip" id="tip"></div>

  {source:"nightly",target:"morphenix",label:"演化提案",type:"internal"},

  {source:"nightly",target:"skills-registry",label:"品質檢查",type:"cross"},

  {source:"nightly",target:"knowledge-lattice",label:"結晶固化",type:"cross"},
  {source:"nightly",target:"budget-mgr",label:"預算結算",type:"cross"},
  {source:"nightly",target:"immunity",label:"抗體修剪",type:"cross"},
  {source:"nightly",target:"skill-synapse",label:"Synapse Decay",type:"cross"},
  {source:"nightly",target:"event-bus",label:"回饋迴路",type:"async"},
  {source:"morphenix",target:"event-bus",label:"提案回饋",type:"async"},
  {source:"cron",target:"nightly",label:"03:00觸發",type:"control"},
  {source:"telegram",target:"user",label:"回傳回應",type:"async"},
  {source:"memory",target:"registry",label:"持久化儲存",type:"cross"},
  {source:"skills-registry",target:"registry",label:"技能資料表",type:"internal"},
  {source:"pulse-db",target:"registry",label:"脈搏記錄",type:"cross"},
  {source:"wee",target:"registry",label:"演化狀態",type:"cross"},
  {source:"eval-engine",target:"registry",label:"Q-Score 存取",type:"cross"},
  {source:"commitment-tracker",target:"registry",label:"承諾記錄",type:"cross"},
  {source:"data-bus",target:"memory",label:"Store路由",type:"internal"},
  {source:"data-bus",target:"vector-index",label:"Store路由",type:"internal"},
  {source:"data-bus",target:"wee",label:"Store路由",type:"internal"},
  {source:"data-bus",target:"skills-registry",label:"Store路由",type:"internal"},
  {source:"data-bus",target:"registry",label:"Store路由",type:"internal"},
  {source:"data-bus",target:"skill-synapse",label:"Store路由",type:"internal"},
  {source:"data-bus",target:"data-watchdog",label:"監控注入",type:"internal"},
  {source:"data-bus",target:"pulse-db",label:"Store路由",type:"cross"},
  {source:"data-bus",target:"knowledge-lattice",label:"Store路由",type:"cross"},
  {source:"data-bus",target:"soul-ring",label:"Store路由",type:"cross"},
  {source:"data-bus",target:"eval-engine",label:"Store路由",type:"cross"},
  {source:"nightly",target:"data-watchdog",label:"Step29健康檢查",type:"cross"},
  {source:"data-watchdog",target:"event-bus",label:"監控事件",type:"async"},
];

const nodeMap = {};
nodes.forEach(n => nodeMap[n.id] = n);

// ═══════════════════════════════════════
//  FORCE-DIRECTED LAYOUT — gravity + attraction + repulsion
// ═══════════════════════════════════════

// Group target positions on a Fibonacci sphere (uniform spherical distribution)
const groupKeys = Object.keys(GC);
const groupTargets = {};
const golden = (1 + Math.sqrt(5)) / 2;
groupKeys.forEach((g, i) => {
  if (g === 'center') { groupTargets[g] = new THREE.Vector3(0, 0, 0); return; }
  const theta = 2 * Math.PI * i / golden;
  const phi = Math.acos(1 - 2 * (i + 0.5) / groupKeys.length);
  const R = 35;
  groupTargets[g] = new THREE.Vector3(
    R * Math.sin(phi) * Math.cos(theta),
    R * Math.cos(phi),
    R * Math.sin(phi) * Math.sin(theta)
  );
});

// Connection weight per node (proxy for "熟練度")
nodes.forEach(n => {
  n.connCount = links.filter(l => l.source === n.id || l.target === n.id).length;
});

// Initialize positions near group targets with jitter
nodes.forEach(n => {
  const target = groupTargets[n.group] || new THREE.Vector3(0, 0, 0);
  const jitter = n.hub ? 3 : 12;
  n.pos = new THREE.Vector3(
    target.x + (Math.random() - 0.5) * jitter,
    target.y + (Math.random() - 0.5) * jitter,
    target.z + (Math.random() - 0.5) * jitter
  );
  n.vx = 0; n.vy = 0; n.vz = 0;
});

// Simulation parameters
let simTemp = 1.0;
const SIM_COOL = 0.9985;
const SIM_MIN = 0.005;

// ═══════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color('#F7F5F0');

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 30, 120);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Lights
scene.add(new THREE.AmbientLight(0xF7F5F0, 0.8));
const dirLight = new THREE.DirectionalLight(0xFFFFFF, 0.5);
dirLight.position.set(60, 80, 60);
scene.add(dirLight);

// TrackballControls — true 360° free rotation (no gimbal lock)
const controls = new TrackballControls(camera, renderer.domElement);
controls.rotateSpeed = 2.0;
controls.zoomSpeed = 1.2;
controls.panSpeed = 0.8;
controls.dynamicDampingFactor = 0.12;
controls.minDistance = 40;
controls.maxDistance = 250;

// Auto-rotation state
let autoRotate = true;
const autoRotSpeed = 0.001;

// ═══════════════════════════════════════
//  CREATE NODE MESHES
// ═══════════════════════════════════════
const sphereGeo = new THREE.SphereGeometry(1, 24, 24);
const nodeMeshes = [];
const nodeGroup = new THREE.Group();

nodes.forEach(n => {
  const color = new THREE.Color(GC[n.group]);
  const mat = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.35,
    metalness: 0.1,
    emissive: color,
    emissiveIntensity: 0.15
  });
  const mesh = new THREE.Mesh(sphereGeo, mat);
  mesh.scale.setScalar(n.r);
  mesh.position.copy(n.pos);
  mesh.userData = n;
  nodeGroup.add(mesh);
  nodeMeshes.push(mesh);
  n.mesh = mesh;
  n.origColor = color.clone();
});

scene.add(nodeGroup);

// ═══════════════════════════════════════
//  CREATE LINK LINES
// ═══════════════════════════════════════
const linkGroup = new THREE.Group();
const linkMeshes = [];

links.forEach(l => {
  const sn = nodeMap[l.source];
  const tn = nodeMap[l.target];
  if (!sn || !tn) return;

  const geo = new THREE.BufferGeometry().setFromPoints([sn.pos, tn.pos]);
  const mat = new THREE.LineBasicMaterial({
    color: lkHex(l.type),
    transparent: true,
    opacity: l.type === 'internal' ? 0.15 : 0.3,
    linewidth: 1
  });
  const line = new THREE.Line(geo, mat);
  line.userData = l;
  linkGroup.add(line);
  linkMeshes.push(line);
  l.line = line;
});

scene.add(linkGroup);

// ═══════════════════════════════════════
//  CSS2D LABEL RENDERER
// ═══════════════════════════════════════
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.left = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

// Node labels
nodes.forEach(n => {
  const div = document.createElement('div');
  div.className = 'node-label ' + (n.hub || n.id === 'event-bus' ? 'hub' : 'sub');
  if (n.hub || n.id === 'event-bus') {
    div.innerHTML = '<div class="en">' + n.label + '</div><div class="zh">' + n.zh + '</div>';
  } else {
    div.textContent = n.zh;
  }
  const lbl = new CSS2DObject(div);
  lbl.position.set(0, n.r + 1.5, 0); // offset above the sphere
  n.mesh.add(lbl);
  n.labelObj = lbl;
  n.labelDiv = div;
});

// Link labels — only cross-system / async / monitor (skip internal to reduce clutter)
const linkLabels = [];
links.forEach(l => {
  if (l.type === 'internal') return;
  const sn = nodeMap[l.source];
  const tn = nodeMap[l.target];
  if (!sn || !tn) return;

  const div = document.createElement('div');
  div.className = 'link-label';
  div.textContent = l.label;

  const lbl = new CSS2DObject(div);
  // position at midpoint of the link
  lbl.position.set(
    (sn.pos.x + tn.pos.x) / 2,
    (sn.pos.y + tn.pos.y) / 2,
    (sn.pos.z + tn.pos.z) / 2
  );
  scene.add(lbl);
  linkLabels.push({ obj: lbl, div: div, link: l });
});

// ═══════════════════════════════════════
//  RAYCASTER (click & hover)
// ═══════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedNode = null;
let hoveredNode = null;

function getIntersectedNode(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeMeshes);
  return intersects.length > 0 ? intersects[0].object.userData : null;
}

// Tooltip
const tip = document.getElementById('tip');
renderer.domElement.addEventListener('mousemove', e => {
  const n = getIntersectedNode(e);
  document.body.style.cursor = n ? 'pointer' : 'default';

  if (n && n !== selectedNode) {
    tip.innerHTML = '<strong>' + n.label + '</strong><br><span class="sub">' + n.zh + '</span><br><span class="grp" style="color:' + GC[n.group] + '">' + GN[n.group] + '</span>';
    tip.style.left = (e.clientX + 14) + 'px';
    tip.style.top = (e.clientY + 14) + 'px';
    tip.classList.add('show');
    if (!selectedNode) highlightNode(n);
  } else if (!n && !selectedNode) {
    tip.classList.remove('show');
    clearHighlight();
  }
});

renderer.domElement.addEventListener('click', e => {
  const n = getIntersectedNode(e);
  if (n) {
    if (selectedNode === n) { selectedNode = null; clearHighlight(); hideInfo(); }
    else { selectedNode = n; highlightNode(n); showInfo(n); }
  } else {
    selectedNode = null; clearHighlight(); hideInfo();
  }
  tip.classList.remove('show');
});

// ═══════════════════════════════════════
//  HIGHLIGHT
// ═══════════════════════════════════════
const dimColor = new THREE.Color('#E2E0DA');

function highlightNode(node) {
  const connected = new Set([node.id]);
  const connLinks = new Set();
  links.forEach(l => {
    if (l.source === node.id) { connected.add(l.target); connLinks.add(l); }
    if (l.target === node.id) { connected.add(l.source); connLinks.add(l); }
  });
  // If hub, also include children's connections
  if (node.hub || node.id === 'event-bus') {
    nodes.filter(n => n.p === node.id).forEach(kid => {
      connected.add(kid.id);
      links.forEach(l => {
        if (l.source === kid.id) { connected.add(l.target); connLinks.add(l); }
        if (l.target === kid.id) { connected.add(l.source); connLinks.add(l); }
      });
    });
  }

  nodeMeshes.forEach(m => {
    const n = m.userData;
    if (connected.has(n.id)) {
      m.material.color.copy(n.origColor);
      m.material.emissive.copy(n.origColor);
      m.material.emissiveIntensity = 0.3;
      m.material.opacity = 1;
      m.material.transparent = false;
      if (n.labelDiv) n.labelDiv.style.opacity = '1';
    } else {
      m.material.color.copy(dimColor);
      m.material.emissive.set(0x000000);
      m.material.emissiveIntensity = 0;
      m.material.opacity = 0.2;
      m.material.transparent = true;
      if (n.labelDiv) n.labelDiv.style.opacity = '0.15';
    }
  });

  linkMeshes.forEach(line => {
    const l = line.userData;
    if (connLinks.has(l)) {
      line.material.opacity = 0.8;
      line.material.color.set(lkHex(l.type));
    } else {
      line.material.opacity = 0.03;
      line.material.color.copy(dimColor);
    }
  });

  // Dim/show link labels
  linkLabels.forEach(ll => {
    ll.div.style.opacity = connLinks.has(ll.link) ? '1' : '0.1';
  });
}

function clearHighlight() {
  nodeMeshes.forEach(m => {
    const n = m.userData;
    m.material.color.copy(n.origColor);
    m.material.emissive.copy(n.origColor);
    m.material.emissiveIntensity = 0.15;
    m.material.opacity = 1;
    m.material.transparent = false;
    if (n.labelDiv) n.labelDiv.style.opacity = '1';
  });
  linkMeshes.forEach(line => {
    const l = line.userData;
    line.material.opacity = l.type === 'internal' ? 0.15 : 0.3;
    line.material.color.set(lkHex(l.type));
  });
  linkLabels.forEach(ll => { ll.div.style.opacity = '1'; });
}

// ═══════════════════════════════════════
//  INFO PANEL
// ═══════════════════════════════════════
function showInfo(node) {
  const outL = [], inL = [];
  links.forEach(l => {
    if (l.source === node.id) outL.push(l);
    if (l.target === node.id) inL.push(l);
  });
  if (node.hub || node.id === 'event-bus') {
    nodes.filter(n => n.p === node.id).forEach(kid => {
      links.forEach(l => {
        if (l.source === kid.id) outL.push(l);
        if (l.target === kid.id) inL.push(l);
      });
    });
  }

  document.getElementById('i-name').textContent = node.label;
  document.getElementById('i-zh').textContent = node.zh;
  const badge = document.getElementById('i-badge');
  badge.textContent = GN[node.group];
  badge.style.background = GC[node.group] + '20';
  badge.style.color = GC[node.group];

  const seenO = new Set();
  document.getElementById('i-out').innerHTML = outL.filter(l => {
    const k = l.target + l.label; if (seenO.has(k)) return false; seenO.add(k); return true;
  }).map(l => '<li><span class="conn-arrow" style="color:' + lkCSS(l.type) + '">→</span>' + (nodeMap[l.target]?.label || l.target) + '<span class="conn-lbl">' + l.label + '</span></li>').join('');

  const seenI = new Set();
  document.getElementById('i-in').innerHTML = inL.filter(l => {
    const k = l.source + l.label; if (seenI.has(k)) return false; seenI.add(k); return true;
  }).map(l => '<li><span class="conn-arrow" style="color:' + lkCSS(l.type) + '">←</span>' + (nodeMap[l.source]?.label || l.source) + '<span class="conn-lbl">' + l.label + '</span></li>').join('');

  document.getElementById('i-out-t').textContent = '輸出連結 (' + seenO.size + ')';
  document.getElementById('i-in-t').textContent = '輸入連結 (' + seenI.size + ')';
  document.getElementById('info').classList.add('visible');
}

function hideInfo() { document.getElementById('info').classList.remove('visible'); }

// ═══════════════════════════════════════
//  GLOBAL CONTROLS
// ═══════════════════════════════════════
window.resetView = function() {
  camera.position.set(0, 30, 120);
  camera.up.set(0, 1, 0);
  controls.target.set(0, 0, 0);
  controls.reset();
};
window.clearSelection = function() { selectedNode = null; clearHighlight(); hideInfo(); };
window.toggleRot = function() {
  autoRotate = !autoRotate;
  document.getElementById('rotBtn').textContent = '自動旋轉：' + (autoRotate ? '開' : '關');
};
window.reheatSim = function() {
  simTemp = 0.6;
  document.getElementById('simBtn').textContent = '重新模擬中…';
  setTimeout(() => { document.getElementById('simBtn').textContent = '重新模擬'; }, 3000);
};

// Legend toggle
document.querySelectorAll('.legend-item').forEach(el => {
  el.addEventListener('click', () => {
    el.classList.toggle('dimmed');
    const g = el.dataset.g;
    const hidden = el.classList.contains('dimmed');
    nodeMeshes.forEach(m => { if (m.userData.group === g) m.visible = !hidden; });
    linkMeshes.forEach(line => {
      const l = line.userData;
      const sg = nodeMap[l.source]?.group;
      const tg = nodeMap[l.target]?.group;
      if (sg === g || tg === g) line.visible = !hidden;
    });
  });
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════
//  FORCE SIMULATION
// ═══════════════════════════════════════
function simulateForces() {
  if (simTemp < SIM_MIN) return;
  const dt = 0.4 * simTemp;

  // Reset forces
  nodes.forEach(n => { n.fx = 0; n.fy = 0; n.fz = 0; });

  // 1. Node repulsion (Coulomb-like)
  const repelK = 100;
  for (let i = 0; i < nodes.length; i++) {
    for (let j = i + 1; j < nodes.length; j++) {
      const a = nodes[i], b = nodes[j];
      let dx = a.pos.x - b.pos.x, dy = a.pos.y - b.pos.y, dz = a.pos.z - b.pos.z;
      let dist2 = dx*dx + dy*dy + dz*dz;
      if (dist2 < 4) dist2 = 4;
      const dist = Math.sqrt(dist2);
      const f = repelK / dist2;
      dx /= dist; dy /= dist; dz /= dist;
      a.fx += dx*f; a.fy += dy*f; a.fz += dz*f;
      b.fx -= dx*f; b.fy -= dy*f; b.fz -= dz*f;
    }
  }

  // 2. Link attraction (spring)
  const linkK = 0.06;
  const restLen = 10;
  links.forEach(l => {
    const sn = nodeMap[l.source], tn = nodeMap[l.target];
    if (!sn || !tn) return;
    let dx = tn.pos.x - sn.pos.x, dy = tn.pos.y - sn.pos.y, dz = tn.pos.z - sn.pos.z;
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
    const f = linkK * (dist - restLen);
    dx /= dist; dy /= dist; dz /= dist;
    sn.fx += dx*f; sn.fy += dy*f; sn.fz += dz*f;
    tn.fx -= dx*f; tn.fy -= dy*f; tn.fz -= dz*f;
  });

  // 3. Spherical shell constraint — push toward target sphere radius
  const sphereK = 0.04;
  nodes.forEach(n => {
    const dist = n.pos.length() || 1;
    const targetR = n.hub || n.id === 'event-bus' ? 0 : 38;
    const diff = targetR - dist;
    n.fx += (n.pos.x / dist) * diff * sphereK;
    n.fy += (n.pos.y / dist) * diff * sphereK;
    n.fz += (n.pos.z / dist) * diff * sphereK;
  });

  // 4. Group clustering — attract to group target center
  const groupK = 0.025;
  nodes.forEach(n => {
    const target = groupTargets[n.group];
    if (!target) return;
    n.fx += (target.x - n.pos.x) * groupK;
    n.fy += (target.y - n.pos.y) * groupK;
    n.fz += (target.z - n.pos.z) * groupK;
  });

  // 5. Central gravity — gentle pull toward origin
  const gravK = 0.005;
  nodes.forEach(n => {
    n.fx -= n.pos.x * gravK;
    n.fy -= n.pos.y * gravK;
    n.fz -= n.pos.z * gravK;
  });

  // 6. Apply forces (mass = 1 + connCount * 0.3)
  const dampK = 0.82;
  nodes.forEach(n => {
    const mass = 1 + n.connCount * 0.3;
    n.vx = (n.vx + n.fx / mass * dt) * dampK;
    n.vy = (n.vy + n.fy / mass * dt) * dampK;
    n.vz = (n.vz + n.fz / mass * dt) * dampK;
    n.pos.x += n.vx * dt;
    n.pos.y += n.vy * dt;
    n.pos.z += n.vz * dt;
    n.mesh.position.copy(n.pos);
  });

  // 7. Update link geometries
  linkMeshes.forEach(line => {
    const l = line.userData;
    const sn = nodeMap[l.source], tn = nodeMap[l.target];
    if (!sn || !tn) return;
    const arr = line.geometry.attributes.position.array;
    arr[0] = sn.pos.x; arr[1] = sn.pos.y; arr[2] = sn.pos.z;
    arr[3] = tn.pos.x; arr[4] = tn.pos.y; arr[5] = tn.pos.z;
    line.geometry.attributes.position.needsUpdate = true;
  });

  // 8. Update link label positions
  linkLabels.forEach(ll => {
    const sn = nodeMap[ll.link.source], tn = nodeMap[ll.link.target];
    if (!sn || !tn) return;
    ll.obj.position.set(
      (sn.pos.x + tn.pos.x) / 2,
      (sn.pos.y + tn.pos.y) / 2,
      (sn.pos.z + tn.pos.z) / 2
    );
  });

  simTemp *= SIM_COOL;
}

// ═══════════════════════════════════════
//  ANIMATE
// ═══════════════════════════════════════
let lastInteraction = 0;
renderer.domElement.addEventListener('pointerdown', () => { lastInteraction = Date.now(); });
renderer.domElement.addEventListener('pointerup', () => { lastInteraction = Date.now(); });

function animate() {
  requestAnimationFrame(animate);

  // Auto-rotation (manual implementation for TrackballControls)
  if (autoRotate && Date.now() - lastInteraction > 2000) {
    const axis = new THREE.Vector3(0, 1, 0);
    const q = new THREE.Quaternion().setFromAxisAngle(axis, autoRotSpeed);
    camera.position.applyQuaternion(q);
    camera.up.applyQuaternion(q);
  }

  controls.update();
  simulateForces();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();
</script>
