<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ember:#C4502A;--ember-light:#E0714D;--ember-dark:#9A3A1C;
  --teal:#2A7A6E;--teal-dark:#1E5C54;
  --gold:#B8923A;--gold-dark:#8A6C2A;
  --ink:#12121A;--slate:#5A5A6E;--mist:#9898A8;
  --border:#E2E0DA;--parchment:#F7F5F0;--snow:#FDFCFA;
  --info:#2A6A8A;--success:#2D8A6E;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--parchment);font-family:'Outfit','Noto Sans TC',sans-serif}

/* ═══ Top Bar ═══ */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;background:rgba(247,245,240,.92);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
}
.topbar h1{
  font-family:'Cormorant Garamond',serif;font-size:1.2rem;
  font-weight:700;color:var(--ember);
}
.topbar .hint{font-size:.68rem;color:var(--mist)}

/* ═══ Legend Panel ═══ */
.legend-panel{
  position:fixed;top:54px;left:12px;z-index:90;
  background:var(--snow);border:1px solid var(--border);
  border-radius:10px;padding:14px 16px;width:210px;
  box-shadow:0 4px 16px rgba(18,18,26,.08);
  font-size:.68rem;
}
.legend-panel h3{
  font-family:'IBM Plex Mono',monospace;font-size:.6rem;
  font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ember-dark);margin-bottom:10px;
}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;color:var(--slate);cursor:pointer;transition:opacity .15s}
.legend-item:hover{opacity:.7}
.legend-item.dimmed{opacity:.3}
.legend-swatch{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.legend-divider{height:1px;background:var(--border);margin:10px 0}
.link-legend{display:flex;align-items:center;gap:8px;margin-bottom:5px;color:var(--mist);font-size:.62rem}
.link-line{width:20px;height:0;flex-shrink:0}

/* ═══ Info Panel ═══ */
.info-panel{
  position:fixed;top:54px;right:12px;z-index:90;
  background:var(--snow);border:1px solid var(--border);
  border-radius:10px;padding:16px 18px;width:280px;
  box-shadow:0 4px 16px rgba(18,18,26,.08);
  transition:opacity .2s,transform .2s;
  opacity:0;transform:translateY(8px);pointer-events:none;
}
.info-panel.visible{opacity:1;transform:translateY(0);pointer-events:auto}
.info-panel .node-name{
  font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:2px;
}
.info-panel .node-zh{font-size:.78rem;color:var(--mist);margin-bottom:8px}
.info-panel .node-group{
  font-family:'IBM Plex Mono',monospace;font-size:.58rem;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;
  padding:2px 8px;border-radius:100px;display:inline-block;margin-bottom:10px;
}
.info-panel h4{font-size:.68rem;font-weight:600;color:var(--slate);margin:8px 0 4px}
.conn-list{list-style:none;max-height:300px;overflow-y:auto}
.conn-list li{
  font-size:.66rem;color:var(--slate);padding:3px 0;
  border-bottom:1px solid rgba(226,224,218,.5);
  display:flex;align-items:center;gap:6px;
}
.conn-list li:last-child{border:none}
.conn-arrow{font-size:.7rem;flex-shrink:0}
.conn-label{
  font-family:'IBM Plex Mono',monospace;font-size:.55rem;
  color:var(--mist);margin-left:auto;
}

/* ═══ Controls ═══ */
.controls{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:90;
  display:flex;gap:8px;
}
.ctrl-btn{
  font-family:'IBM Plex Mono',monospace;font-size:.62rem;font-weight:600;
  letter-spacing:.04em;padding:6px 14px;border-radius:100px;
  border:1.5px solid var(--border);background:var(--snow);
  color:var(--slate);cursor:pointer;transition:all .15s;
}
.ctrl-btn:hover{border-color:var(--ember);color:var(--ember)}
.ctrl-btn.active{background:var(--ember);color:#fff;border-color:var(--ember)}

/* ═══ SVG ═══ */
svg{display:block}
.link{fill:none;stroke-width:1.2;transition:opacity .3s,stroke-width .3s}
.link-label{
  font-family:'IBM Plex Mono',monospace;font-size:8px;
  fill:var(--mist);pointer-events:none;opacity:0;transition:opacity .3s;
}
.node-circle{stroke-width:2;cursor:grab;transition:r .2s,opacity .3s}
.node-circle:active{cursor:grabbing}
.node-label{
  font-family:'Outfit','Noto Sans TC',sans-serif;
  font-size:9px;fill:var(--ink);pointer-events:none;
  text-anchor:middle;transition:opacity .3s;font-weight:500;
}
.node-label-zh{
  font-size:7.5px;fill:var(--mist);pointer-events:none;
  text-anchor:middle;transition:opacity .3s;
}

/* highlight states */
.faded .link{opacity:.03!important;stroke-width:1!important}
.faded .node-circle{opacity:.12!important}
.faded .node-label,.faded .node-label-zh{opacity:.1!important}
.faded .highlighted-link{opacity:.85!important;stroke-width:2.5!important}
.faded .highlighted-node{opacity:1!important}
.faded .highlighted-label{opacity:1!important}
.faded .link-label.highlighted-label{opacity:1!important}
</style>
</head>

  <div class="legend-item" data-group="external" onclick="toggleGroup(this)"><div class="legend-swatch" style="background:var(--mist)"></div>外部服務</div>
  <div class="legend-divider"></div>
  <div class="link-legend"><div class="link-line" style="border-top:2px solid var(--slate)"></div>同步 / 內部</div>
  <div class="link-legend"><div class="link-line" style="border-top:2px solid var(--ember)"></div>跨系統連結</div>
  <div class="link-legend"><div class="link-line" style="border-top:2px dashed var(--gold)"></div>非同步 / 回饋</div>
  <div class="link-legend"><div class="link-line" style="border-top:2px dotted var(--info)"></div>監控</div>
</div>

<div class="info-panel" id="info">

  <h4 id="info-in-title">輸入連結</h4>
  <ul class="conn-list" id="info-in"></ul>
</div>

<div class="controls">
  <button class="ctrl-btn" onclick="zoomFit()">全覽</button>
  <button class="ctrl-btn" onclick="resetHighlight()">重置</button>
</div>

  {s:"doctor",t:"system-audit",label:"系統審計",type:"internal"},
  {s:"doctor",t:"health-check",label:"健康檢查",type:"internal"},
  {s:"doctor",t:"self-diagnosis",label:"自我診斷",type:"internal"},
  {s:"doctor",t:"auto-repair",label:"自動修復",type:"internal"},
  {s:"doctor",t:"surgery",label:"精準手術",type:"internal"},
  {s:"doctor",t:"log-analyzer",label:"日誌分析",type:"internal"},
  {s:"doctor",t:"code-analyzer",label:"代碼分析",type:"internal"},
  // ── Doctor Cross ──
  {s:"auto-repair",t:"gateway",label:"重啟修復",type:"cross"},
  {s:"system-audit",t:"service-health",label:"交叉驗證",type:"cross"},
  // ── LLM ──
  {s:"llm-router",t:"budget-mgr",label:"預算追蹤",type:"internal"},
  {s:"llm-router",t:"rate-limit",label:"速限控制",type:"internal"},
  {s:"llm-router",t:"llm-cache",label:"快取查詢",type:"internal"},
  {s:"llm-router",t:"anthropic-api",label:"API 呼叫",type:"cross"},
  // ── Data ──
  {s:"memory",t:"vector-index",label:"嵌入索引",type:"cross"},
  {s:"vector-index",t:"qdrant",label:"向量存儲",type:"cross"},
  {s:"wee",t:"skill-synapse",label:"突觸演化",type:"internal"},
  {s:"wee",t:"skills-registry",label:"演化追蹤",type:"cross"},
  // ── Nightly ──
  {s:"nightly",t:"morphenix",label:"演化提案",type:"internal"},
  {s:"nightly",t:"memory",label:"記憶壓縮",type:"cross"},
  {s:"nightly",t:"skills-registry",label:"品質檢查",type:"cross"},
  {s:"nightly",t:"wee",label:"演化速度",type:"cross"},
  {s:"nightly",t:"knowledge-lattice",label:"結晶固化",type:"cross"},
  {s:"nightly",t:"budget-mgr",label:"預算結算",type:"cross"},
  {s:"nightly",t:"immunity",label:"抗體修剪",type:"cross"},
  {s:"nightly",t:"skill-synapse",label:"Synapse Decay",type:"cross"},
  {s:"nightly",t:"event-bus",label:"回饋迴路",type:"async"},
  {s:"morphenix",t:"event-bus",label:"提案回饋",type:"async"},
  {s:"cron",t:"nightly",label:"03:00 觸發",type:"control"},
  // ── Response ──
  {s:"telegram",t:"user",label:"回傳回應",type:"async"},
];

// ═══════════════════════════════════════════════
//  SETUP
// ═══════════════════════════════════════════════
const W = window.innerWidth, H = window.innerHeight;
const CX = W/2, CY = H/2;

// Compute initial positions
const nodes = rawNodes.map((d,i) => {
  const angle = GA[d.group] || 0;
  let dist = 0;
  if(d.id === 'event-bus') dist = 0;
  else if(d.hub || !d.p) dist = d.group === 'center' ? 0 : 260;
  else dist = 400;
  // Add some spread within group
  const spread = d.p ? (i % 7 - 3) * 0.25 : (i % 5 - 2) * 0.15;
  return {
    ...d,
    x: CX + Math.cos(angle + spread) * dist + (Math.random()-.5)*30,
    y: CY + Math.sin(angle + spread) * dist + (Math.random()-.5)*30,
  };
});

const nodeMap = Object.fromEntries(nodes.map(n => [n.id, n]));
const links = rawLinks.map(l => ({source: l.s, target: l.t, label: l.label, type: l.type}));

// ═══════════════════════════════════════════════
//  SVG + ZOOM
// ═══════════════════════════════════════════════
const svg = d3.select("#graph").attr("width", W).attr("height", H);
const g = svg.append("g");

const zoom = d3.zoom().scaleExtent([0.2, 4]).on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);

// Arrow markers
const defs = svg.append("defs");
Object.entries(groupColors).forEach(([k,c]) => {
  defs.append("marker").attr("id",`arrow-${k}`)
    .attr("viewBox","0 0 8 6").attr("refX",8).attr("refY",3)
    .attr("markerWidth",6).attr("markerHeight",5).attr("orient","auto")
    .append("path").attr("d","M0,0 L8,3 L0,6 Z").attr("fill",c).attr("opacity",.6);
});
// generic arrows for link types
["cross","async","monitor","flow","control","internal"].forEach(t => {
  const c = t==='cross'?'#C4502A':t==='async'?'#B8923A':t==='monitor'?'#2A6A8A':'#9898A8';
  defs.append("marker").attr("id",`arrow-${t}`)
    .attr("viewBox","0 0 8 6").attr("refX",8).attr("refY",3)
    .attr("markerWidth",6).attr("markerHeight",5).attr("orient","auto")
    .append("path").attr("d","M0,0 L8,3 L0,6 Z").attr("fill",c).attr("opacity",.7);
});

// ═══════════════════════════════════════════════
//  LINKS
// ═══════════════════════════════════════════════
function linkColor(type) {
  switch(type){
    case 'cross': return '#C4502A';
    case 'async': return '#B8923A';
    case 'monitor': return '#2A6A8A';
    case 'control': return '#5A5A6E';
    case 'flow': return '#C4502A';
    default: return '#C4C2BC';
  }
}
function linkDash(type) {
  switch(type){
    case 'async': return '6,3';
    case 'monitor': return '2,3';
    default: return 'none';
  }
}

const linkG = g.append("g").attr("class","links");
const linkEls = linkG.selectAll("line").data(links).enter().append("line")
  .attr("class","link")
  .attr("stroke", d => linkColor(d.type))
  .attr("stroke-dasharray", d => linkDash(d.type))
  .attr("opacity", d => d.type==='internal' ? 0.18 : 0.25)
  .attr("marker-end", d => `url(#arrow-${d.type})`);

// Link labels (shown on highlight)
const linkLabelEls = linkG.selectAll("text").data(links).enter().append("text")
  .attr("class","link-label")
  .text(d => d.label);

// ═══════════════════════════════════════════════
//  NODES
// ═══════════════════════════════════════════════
const nodeG = g.append("g").attr("class","nodes");

const nodeGroups = nodeG.selectAll("g").data(nodes).enter().append("g").attr("class","node-g");

// Glow for hubs
nodeGroups.filter(d => d.hub || d.id==='event-bus').append("circle")
  .attr("r", d => d.r + 6)
  .attr("fill", d => groupColors[d.group])
  .attr("opacity", 0.12);

// Main circle
nodeGroups.append("circle")
  .attr("class","node-circle")
  .attr("r", d => d.r)
  .attr("fill", d => groupColors[d.group])
  .attr("stroke", d => d3.color(groupColors[d.group]).darker(.4))
  .attr("opacity", d => d.p ? 0.85 : 1);

// Labels
nodeGroups.append("text")
  .attr("class","node-label")
  .attr("dy", d => d.r + 12)
  .text(d => d.label)
  .style("font-size", d => (d.hub || d.id==='event-bus') ? '11px' : d.p ? '8px' : '10px')
  .style("font-weight", d => (d.hub || d.id==='event-bus') ? '600' : '500');

nodeGroups.append("text")
  .attr("class","node-label-zh")
  .attr("dy", d => d.r + 22)
  .text(d => d.zh)
  .style("font-size", d => d.p ? '7px' : '8px');

// ═══════════════════════════════════════════════
//  FORCE SIMULATION
// ═══════════════════════════════════════════════
const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id)
    .distance(d => {
      if(d.type === 'internal') return 70;
      if(d.type === 'control') return 140;
      return 180;
    }).strength(d => d.type === 'internal' ? 0.8 : 0.15))
  .force("charge", d3.forceManyBody().strength(d => d.hub ? -600 : d.p ? -150 : -300))
  .force("center", d3.forceCenter(CX, CY).strength(0.03))
  .force("collide", d3.forceCollide(d => d.r + 18).strength(0.7))
  .force("radial", d3.forceRadial(d => {
    if(d.id === 'event-bus') return 0;
    if(d.hub || (!d.p && d.group !== 'center')) return 250;
    return 380;
  }, CX, CY).strength(d => d.id==='event-bus' ? 1 : 0.12))
  .alphaDecay(0.015)
  .on("tick", ticked);

function ticked() {
  linkEls
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => {
      // Shorten line to not overlap target circle
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      return d.target.x - dx/dist * (d.target.r || 10);
    })
    .attr("y2", d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      return d.target.y - dy/dist * (d.target.r || 10);
    });

  linkLabelEls
    .attr("x", d => (d.source.x + d.target.x) / 2)
    .attr("y", d => (d.source.y + d.target.y) / 2 - 3);

  nodeGroups.attr("transform", d => `translate(${d.x},${d.y})`);
}

// Drag
const drag = d3.drag()
  .on("start", (e,d) => { if(!e.active) simulation.alphaTarget(0.1).restart(); d.fx=d.x; d.fy=d.y; })
  .on("drag", (e,d) => { d.fx=e.x; d.fy=e.y; })
  .on("end", (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; });
nodeGroups.call(drag);

// ═══════════════════════════════════════════════
//  INTERACTIONS
// ═══════════════════════════════════════════════
let locked = null;

function getConnected(nodeId) {
  const connNodes = new Set([nodeId]);
  const connLinks = new Set();
  const outLinks = [], inLinks = [];

  links.forEach((l,i) => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if(sid === nodeId) { connNodes.add(tid); connLinks.add(i); outLinks.push(l); }
    if(tid === nodeId) { connNodes.add(sid); connLinks.add(i); inLinks.push(l); }
  });

  // If hub, also include children's connections
  const nd = nodeMap[nodeId];
  if(nd && (nd.hub || nd.id === 'event-bus')) {
    const children = nodes.filter(n => n.p === nodeId).map(n => n.id);
    children.forEach(cid => {
      connNodes.add(cid);
      links.forEach((l,i) => {
        const sid = typeof l.source === 'object' ? l.source.id : l.source;
        const tid = typeof l.target === 'object' ? l.target.id : l.target;
        if(sid === cid) { connNodes.add(tid); connLinks.add(i); outLinks.push(l); }
        if(tid === cid) { connNodes.add(sid); connLinks.add(i); inLinks.push(l); }
      });
    });
  }

  return { connNodes, connLinks, outLinks, inLinks };
}

function highlight(nodeId) {
  const { connNodes, connLinks, outLinks, inLinks } = getConnected(nodeId);
  const nd = nodeMap[nodeId];

  // Add faded class to SVG
  g.classed("faded", true);

  // Highlight connected elements
  linkEls.each(function(d,i) {
    d3.select(this).classed("highlighted-link", connLinks.has(i));
  });
  linkLabelEls.each(function(d,i) {
    d3.select(this).classed("highlighted-label", connLinks.has(i));
  });
  nodeGroups.each(function(d) {
    const isConn = connNodes.has(d.id);
    d3.select(this).selectAll("circle").classed("highlighted-node", isConn);
    d3.select(this).selectAll("text").classed("highlighted-label", isConn);
  });

  // Update info panel
  const panel = document.getElementById('info');
  panel.classList.add('visible');
  document.getElementById('info-name').textContent = nd.label;
  document.getElementById('info-zh').textContent = nd.zh;
  const groupEl = document.getElementById('info-group');
  groupEl.textContent = groupNames[nd.group];
  groupEl.style.background = groupColors[nd.group] + '20';
  groupEl.style.color = groupColors[nd.group];

  const outEl = document.getElementById('info-out');
  const inEl = document.getElementById('info-in');

  // De-duplicate
  const seenOut = new Set(), seenIn = new Set();
  outEl.innerHTML = outLinks.filter(l => {
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if(seenOut.has(tid+l.label)) return false; seenOut.add(tid+l.label); return true;
  }).map(l => {
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    const tn = nodeMap[tid];
    return `<li><span class="conn-arrow" style="color:${linkColor(l.type)}">→</span> ${tn?tn.label:tid} <span class="conn-label">${l.label}</span></li>`;
  }).join('');

  inEl.innerHTML = inLinks.filter(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    if(seenIn.has(sid+l.label)) return false; seenIn.add(sid+l.label); return true;
  }).map(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const sn = nodeMap[sid];
    return `<li><span class="conn-arrow" style="color:${linkColor(l.type)}">←</span> ${sn?sn.label:sid} <span class="conn-label">${l.label}</span></li>`;
  }).join('');

  document.getElementById('info-out-title').textContent = `輸出連結 (${seenOut.size})`;
  document.getElementById('info-in-title').textContent = `輸入連結 (${seenIn.size})`;
}

function resetHighlight() {
  locked = null;
  g.classed("faded", false);
  linkEls.classed("highlighted-link", false);
  linkLabelEls.classed("highlighted-label", false);
  nodeGroups.selectAll("circle").classed("highlighted-node", false);
  nodeGroups.selectAll("text").classed("highlighted-label", false);
  document.getElementById('info').classList.remove('visible');
}

// Mouse events
nodeGroups.on("mouseover", function(e, d) {
  if(locked) return;
  highlight(d.id);
}).on("mouseout", function() {
  if(locked) return;
  resetHighlight();
}).on("click", function(e, d) {
  e.stopPropagation();
  if(locked === d.id) { locked = null; resetHighlight(); return; }
  locked = d.id;
  highlight(d.id);
});

svg.on("click", () => { if(locked) resetHighlight(); });

// ═══════════════════════════════════════════════
//  CONTROLS
// ═══════════════════════════════════════════════
function zoomFit() {
  const bounds = g.node().getBBox();
  const dx = bounds.width, dy = bounds.height;
  const x = bounds.x, y = bounds.y;
  const scale = Math.min(0.85, 0.85 / Math.max(dx/W, dy/H));
  const tx = W/2 - scale * (x + dx/2);
  const ty = H/2 - scale * (y + dy/2);
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx,ty).scale(scale));
}

function toggleGroup(el) {
  const grp = el.dataset.group;
  el.classList.toggle('dimmed');
  const dimmed = el.classList.contains('dimmed');
  nodeGroups.filter(d => d.group === grp).style("display", dimmed ? "none" : "block");
  linkEls.filter(d => {
    const sid = typeof d.source === 'object' ? d.source.group : nodeMap[d.source]?.group;
    const tid = typeof d.target === 'object' ? d.target.group : nodeMap[d.target]?.group;
    return sid === grp || tid === grp;
  }).style("display", dimmed ? "none" : "block");
}

// Initial zoom fit after simulation settles
setTimeout(zoomFit, 2000);

// Resize
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  svg.attr("width", w).attr("height", h);
});
</script>
</body>
</html>
