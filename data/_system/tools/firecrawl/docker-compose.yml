services:
  redis:
    image: redis:7-alpine
    container_name: museclaw-firecrawl-redis
    restart: unless-stopped
    networks: [firecrawl]
  playwright:
    image: ghcr.io/firecrawl/playwright-service:latest
    container_name: museclaw-firecrawl-playwright
    restart: unless-stopped
    command: ['node', 'dist/server.js']
    environment:
      - PORT=3000
    networks: [firecrawl]
  api:
    image: ghcr.io/firecrawl/firecrawl:latest
    container_name: museclaw-firecrawl-api
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://playwright:3000
      - USE_DB_AUTHENTICATION=false
      - PORT=3002
      - HOST=0.0.0.0
      - NUM_WORKERS_PER_QUEUE=1
      - SELF_HOSTED_WEBHOOK_SECRET=museclaw
    ports:
      - '127.0.0.1:3002:3002'
    depends_on: [redis, playwright]
    command: ['node', '--max-old-space-size=8192', 'dist/src/index.js']
    networks: [firecrawl]
  worker:
    image: ghcr.io/firecrawl/firecrawl:latest
    container_name: museclaw-firecrawl-worker
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://playwright:3000
      - USE_DB_AUTHENTICATION=false
      - NUM_WORKERS_PER_QUEUE=1
    depends_on: [redis, playwright]
    command: ['node', '--max-old-space-size=8192', 'dist/src/services/queue-worker.js']
    networks: [firecrawl]
networks:
  firecrawl:
    driver: bridge
