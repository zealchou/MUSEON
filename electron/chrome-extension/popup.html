<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
    }
    .header {
      padding: 12px 16px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .status {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #e74c3c;
    }
    .status.connected { background: #2ecc71; }
    .content { padding: 12px 16px; }
    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    input[type="text"] {
      flex: 1;
      padding: 8px 12px;
      background: #1a1a2e;
      border: 1px solid #3a3a6a;
      border-radius: 6px;
      color: #e0e0ff;
      font-size: 13px;
      outline: none;
    }
    input:focus { border-color: #6a6aaa; }
    button {
      padding: 8px 14px;
      background: #2a2a5e;
      border: 1px solid #4a4a8a;
      border-radius: 6px;
      color: #e0e0ff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3a3a7e; }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .action-btn {
      padding: 10px;
      text-align: center;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .action-btn:hover {
      background: #2a2a4e;
      border-color: #4a4a8a;
    }
    .action-btn .icon { font-size: 20px; margin-bottom: 4px; }
    .action-btn .label { font-size: 11px; color: #aaa; }
    .footer {
      padding: 8px 16px;
      border-top: 1px solid #2a2a4a;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="status" id="status-dot"></div>
    <h1>MUSEON</h1>
  </div>
  <div class="content">
    <div class="input-group">
      <input type="text" id="query-input" placeholder="Ask MUSEON...">
      <button id="ask-btn">Ask</button>
    </div>
    <div class="actions">
      <div class="action-btn" id="btn-capture">
        <div class="icon">&#128218;</div>
        <div class="label">Capture Page</div>
      </div>
      <div class="action-btn" id="btn-explore">
        <div class="icon">&#128270;</div>
        <div class="label">Explore</div>
      </div>
      <div class="action-btn" id="btn-skills">
        <div class="icon">&#9889;</div>
        <div class="label">Skills</div>
      </div>
      <div class="action-btn" id="btn-status">
        <div class="icon">&#128202;</div>
        <div class="label">System</div>
      </div>
    </div>
  </div>
  <div class="footer">MUSEON v2.3 &middot; Neural Assistant</div>
  <script src="popup.js"></script>
</body>
</html>
